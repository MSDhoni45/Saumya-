name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  api-lint-test:
    name: API — lint + test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      REDIS_URL: redis://localhost:6379/0
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_JWKS_URL: https://placeholder.supabase.co/auth/v1/.well-known/jwks.json
      SUPABASE_ANON_KEY: placeholder
      SUPABASE_SERVICE_ROLE_KEY: placeholder
      SUPABASE_JWT_ISSUER: https://placeholder.supabase.co/auth/v1
      TOKEN_ENCRYPTION_KEY: ${{ secrets.CI_TOKEN_ENCRYPTION_KEY }}
      WHATSAPP_APP_ID: placeholder
      WHATSAPP_APP_SECRET: placeholder
      WHATSAPP_WEBHOOK_VERIFY_TOKEN: placeholder
      ENVIRONMENT: test
      DEBUG: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        working-directory: apps/api
        run: pip install -r requirements.txt

      - name: Type check (mypy)
        working-directory: apps/api
        run: mypy app --ignore-missing-imports

      - name: Test (pytest)
        working-directory: apps/api
        run: pytest tests/ -x -q

  web-check:
    name: Web — typecheck + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Type check
        working-directory: apps/web
        run: npm run typecheck

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          BACKEND_API_URL: http://localhost:8000
        run: npm run build
