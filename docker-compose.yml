version: "3.9"

# Local development stack.
# Prerequisites: create apps/api/.env from apps/api/.env.example
# Usage: docker compose up --build

services:
  api:
    build:
      context: apps/api
      dockerfile: Dockerfile
    command:
      - uvicorn
      - app.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    ports:
      - "8000:8000"
    env_file: apps/api/.env
    volumes:
      - ./apps/api/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  worker:
    build:
      context: apps/api
      dockerfile: Dockerfile
    command:
      - celery
      - -A
      - app.workers.celery_app.celery_app
      - worker
      - --loglevel=info
      - --concurrency=2
      - -Q
      - default,ai,billing
    env_file: apps/api/.env
    volumes:
      - ./apps/api/app:/app/app
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  beat:
    build:
      context: apps/api
      dockerfile: Dockerfile
    command:
      - celery
      - -A
      - app.workers.celery_app.celery_app
      - beat
      - --loglevel=info
    env_file: apps/api/.env
    volumes:
      - ./apps/api/app:/app/app
      - beat_data:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  beat_data:
